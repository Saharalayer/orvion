<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orvion Login</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center px-6">

  <div class="absolute w-[500px] h-[500px] bg-indigo-500/20 blur-[120px] rounded-full"></div>

  <div class="relative z-10 w-full max-w-md border border-white/10 bg-white/5 backdrop-blur-xl rounded-[32px] p-10">

    <div class="text-center">
      <h1 class="text-5xl font-black">Orvion</h1>
      <p class="mt-4 text-gray-400">
        Human API Console Access
      </p>
    </div>

    <form class="mt-10 space-y-5">

      <input
        type="email"
        placeholder="Email Address"
        class="w-full px-5 py-4 rounded-2xl bg-black/40 border border-white/10 outline-none focus:border-indigo-500"
      />

      <input
        type="password"
        placeholder="Password"
        class="w-full px-5 py-4 rounded-2xl bg-black/40 border border-white/10 outline-none focus:border-indigo-500"
      />

      <button
        class="w-full py-4 rounded-2xl bg-indigo-500 hover:bg-indigo-400 transition font-bold text-lg"
      >
        Access Console
      </button>

    </form>

    <p class="mt-8 text-center text-gray-500 text-sm">
      AI-Powered Human Infrastructure
    </p>

  </div>

</body>
</html>
