<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agents</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen p-10">

  <div class="max-w-7xl mx-auto">

    <div class="flex items-center justify-between">

      <div>
        <p class="uppercase tracking-[0.3em] text-indigo-400 text-sm">
          Autonomous System
        </p>

        <h1 class="mt-3 text-6xl font-black">
          AI Agents
        </h1>
      </div>

      <button class="px-6 py-4 rounded-2xl bg-indigo-500 hover:bg-indigo-400 transition font-semibold">
        Create Agent
      </button>

    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mt-20">

      <div class="rounded-3xl border border-white/10 bg-white/5 p-8">
        <h3 class="text-2xl font-black">Email Agent</h3>
        <p class="mt-5 text-gray-400">
          Handles emails, replies, and smart communication.
        </p>

        <div class="mt-8 flex items-center justify-between">
          <span class="text-green-400">Active</span>
          <button class="px-4 py-2 rounded-xl bg-white/10 hover:bg-white/20 transition">
            Manage
          </button>
        </div>
      </div>

      <div class="rounded-3xl border border-white/10 bg-white/5 p-8">
        <h3 class="text-2xl font-black">Research Agent</h3>
        <p class="mt-5 text-gray-400">
          Searches and summarizes information automatically.
        </p>

        <div class="mt-8 flex items-center justify-between">
          <span class="text-cyan-400">Running</span>
          <button class="px-4 py-2 rounded-xl bg-white/10 hover:bg-white/20 transition">
            Manage
          </button>
        </div>
      </div>

      <div class="rounded-3xl border border-white/10 bg-white/5 p-8">
        <h3 class="text-2xl font-black">Document Agent</h3>
        <p class="mt-5 text-gray-400">
          Reads PDFs and extracts structured knowledge.
        </p>

        <div class="mt-8 flex items-center justify-between">
          <span class="text-indigo-400">Learning</span>
          <button class="px-4 py-2 rounded-xl bg-white/10 hover:bg-white/20 transition">
            Manage
          </button>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
