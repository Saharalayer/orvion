<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflows</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen p-10">

  <div class="max-w-7xl mx-auto">

    <p class="uppercase tracking-[0.3em] text-indigo-400 text-sm">
      Automation Engine
    </p>

    <h1 class="mt-4 text-6xl font-black">
      Workflows
    </h1>

    <div class="mt-16 overflow-x-auto rounded-3xl border border-white/10 bg-white/5 p-6">

      <table class="w-full text-left">

        <thead>
          <tr class="border-b border-white/10 text-gray-400">
            <th class="pb-5">Workflow</th>
            <th class="pb-5">Status</th>
            <th class="pb-5">Executions</th>
            <th class="pb-5">Last Run</th>
          </tr>
        </thead>

        <tbody>

          <tr class="border-b border-white/5">
            <td class="py-6">Invoice Processing</td>
            <td class="py-6 text-green-400">Active</td>
            <td class="py-6">12,493</td>
            <td class="py-6">2 min ago</td>
          </tr>

          <tr class="border-b border-white/5">
            <td class="py-6">Email Automation</td>
            <td class="py-6 text-indigo-400">Running</td>
            <td class="py-6">8,920</td>
            <td class="py-6">Just now</td>
          </tr>

          <tr>
            <td class="py-6">Document AI</td>
            <td class="py-6 text-cyan-400">Synced</td>
            <td class="py-6">4,123</td>
            <td class="py-6">5 min ago</td>
          </tr>

        </tbody>

      </table>

    </div>

  </div>

</body>
</html>
