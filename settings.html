<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen p-10">

  <div class="max-w-4xl mx-auto">

    <p class="uppercase tracking-[0.3em] text-indigo-400 text-sm">
      Preferences
    </p>

    <h1 class="mt-4 text-6xl font-black">
      Settings
    </h1>

    <div class="mt-16 space-y-8">

      <div class="rounded-3xl border border-white/10 bg-white/5 p-8">
        <h3 class="text-2xl font-black">Profile</h3>

        <div class="mt-6 space-y-4">
          <input type="text" placeholder="Full Name" class="w-full px-5 py-4 rounded-2xl bg-black/40 border border-white/10">
          <input type="email" placeholder="Email Address" class="w-full px-5 py-4 rounded-2xl bg-black/40 border border-white/10">
        </div>
      </div>

      <div class="rounded-3xl border border-white/10 bg-white/5 p-8">
        <h3 class="text-2xl font-black">AI Preferences</h3>

        <div class="mt-6 flex items-center justify-between">
          <span>Persistent Memory</span>
          <input type="checkbox" checked>
        </div>

        <div class="mt-6 flex items-center justify-between">
          <span>Autonomous Agents</span>
          <input type="checkbox" checked>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
