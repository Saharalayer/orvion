<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Layer</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen p-10">

  <div class="max-w-7xl mx-auto">

    <p class="uppercase tracking-[0.3em] text-indigo-400 text-sm">
      Persistent Intelligence
    </p>

    <h1 class="mt-4 text-6xl font-black">
      Memory Layer
    </h1>

    <div class="mt-20 grid lg:grid-cols-2 gap-8">

      <div class="rounded-3xl border border-white/10 bg-white/5 p-8 h-[400px] flex items-center justify-center text-gray-400 text-xl">
        AI Memory Visualization
      </div>

      <div class="space-y-6">

        <div class="rounded-3xl border border-white/10 bg-white/5 p-6">
          <h3 class="text-2xl font-black">Identity Context</h3>
          <p class="mt-4 text-gray-400">
            Stores user preferences and communication behavior.
          </p>
        </div>

        <div class="rounded-3xl border border-white/10 bg-white/5 p-6">
          <h3 class="text-2xl font-black">Conversation Memory</h3>
          <p class="mt-4 text-gray-400">
            Persistent memory between AI interactions.
          </p>
        </div>

        <div class="rounded-3xl border border-white/10 bg-white/5 p-6">
          <h3 class="text-2xl font-black">Knowledge Layer</h3>
          <p class="mt-4 text-gray-400">
            Structured knowledge extracted from documents and workflows.
          </p>
        </div>

      </div>

    </div>

  </div>

</body>
</html>
